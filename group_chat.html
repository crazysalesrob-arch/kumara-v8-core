<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☯ Group Chat — Rob · Hermes · Gemini</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 20px;
    max-width: 800px;
    margin: auto;
  }
  h1 {
    text-align: center;
    font-size: 1.4em;
    padding: 16px 0;
    border-bottom: 1px solid #2a2a2a;
    margin-bottom: 20px;
    color: #aaa;
  }
  h1 span.rob { color: #4fc3f7; }
  h1 span.hermes { color: #ba68c8; }
  h1 span.gemini { color: #81c784; }
  #chat { }
  .msg {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: bold;
  }
  .avatar.rob { background: #1565c0; }
  .avatar.hermes { background: #6a1b9a; }
  .avatar.gemini { background: #2e7d32; }
  .bubble { flex: 1; }
  .bubble .header {
    display: flex; gap: 8px; align-items: baseline;
    margin-bottom: 4px;
  }
  .bubble .name {
    font-weight: 700; font-size: 0.9em;
  }
  .name.rob { color: #4fc3f7; }
  .name.hermes { color: #ce93d8; }
  .name.gemini { color: #81c784; }
  .bubble .time {
    font-size: 0.7em; color: #666;
  }
  .bubble .text {
    line-height: 1.6;
    font-size: 0.92em;
    color: #d0d0d0;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble .text code {
    background: #1a1a2e;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.9em;
    color: #7ec8e3;
  }
  .bubble .text pre {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 0.85em;
  }
  .divider {
    text-align: center;
    color: #333;
    font-size: 0.75em;
    padding: 8px 0;
    border-top: 1px solid #1a1a1a;
    margin: 12px 0;
  }
  .connecting {
    text-align: center;
    color: #555;
    padding: 40px;
    font-style: italic;
  }
  #status {
    text-align: center;
    font-size: 0.75em;
    color: #555;
    padding: 12px 0 4px;
  }
  #status .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  .dot.green { background: #4caf50; }
  .dot.yellow { background: #ff9800; }
  .dot.red { background: #f44336; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<h1>
  <span class="rob">Rob</span>
  <span style="color:#555">·</span>
  <span class="hermes">Hermes</span>
  <span style="color:#555">·</span>
  <span class="gemini">Gemini</span>
</h1>

<div id="chat"><div class="connecting">connecting...</div></div>
<div id="status"><span class="dot green"></span>watching group_chat.md</div>

<script>
const CHAT_FILE = 'group_chat.md';
const POLL_MS = 3000;
let lastHash = '';

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    return `<pre><code>${escapeHtml(code)}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Lines
  text = text.replace(/\n/g, '<br>');
  return text;
}

function parseMessages(text) {
  const sections = text.split(/\n---+\n/);
  const msgs = [];
  for (const section of sections) {
    const trimmed = section.trim();
    if (!trimmed) continue;

    // Parse header like "## Rob [timestamp]" or "## Hermes [timestamp]"
    const headerMatch = trimmed.match(/^##\s+(\w+)\s*\[([^\]]*)\]/);
    if (!headerMatch) continue;

    const speaker = headerMatch[1];
    const timestamp = headerMatch[2];
    const body = trimmed.substring(headerMatch[0].length).trim();

    // Determine speaker type
    let type = 'hermes';
    if (speaker.toLowerCase() === 'rob') type = 'rob';
    else if (speaker.toLowerCase() === 'gemini') type = 'gemini';

    msgs.push({ speaker, timestamp, body, type });
  }
  return msgs;
}

async function fetchChat() {
  try {
    const resp = await fetch(CHAT_FILE + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();

    // Check if changed
    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text)).then(h => Array.from(new Uint8Array(h)).slice(0,8).map(b => b.toString(16).padStart(2,'0')).join(''));
    if (hash === lastHash) return;
    lastHash = hash;

    const msgs = parseMessages(text);
    if (msgs.length === 0) {
      document.getElementById('chat').innerHTML = '<div class="connecting">no messages yet</div>';
      return;
    }

    const html = msgs.map(m => {
      const type = m.type;
      const renderedBody = renderMarkdown(m.body);
      return `
        <div class="msg">
          <div class="avatar ${type}">${type === 'rob' ? 'R' : type === 'hermes' ? 'H' : 'G'}</div>
          <div class="bubble">
            <div class="header">
              <span class="name ${type}">${escapeHtml(m.speaker)}</span>
              <span class="time">${escapeHtml(m.timestamp)}</span>
            </div>
            <div class="text">${renderedBody}</div>
          </div>
        </div>
      `;
    }).join('');

    const chat = document.getElementById('chat');
    chat.innerHTML = html;
    chat.scrollTop = chat.scrollHeight;

    const status = document.getElementById('status');
    status.innerHTML = '<span class="dot green"></span>live · ' + msgs.length + ' messages · last: ' + msgs[msgs.length-1].speaker;

  } catch (e) {
    document.getElementById('status').innerHTML = '<span class="dot red"></span>error: ' + e.message;
  }
}

setInterval(fetchChat, POLL_MS);
fetchChat();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☯ Group Chat — Rob · Hermes · Gemini</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    max-width: 800px;
    margin: auto;
    padding: 0 16px;
  }
  h1 {
    text-align: center;
    font-size: 1.2em;
    padding: 14px 0;
    border-bottom: 1px solid #2a2a2a;
    margin-bottom: 0;
    flex-shrink: 0;
    color: #aaa;
  }
  h1 span.rob { color: #4fc3f7; }
  h1 span.hermes { color: #ba68c8; }
  h1 span.gemini { color: #81c784; }
  h1 span.badge {
    font-size: 0.5em;
    margin-left: 6px;
    padding: 2px 6px;
    border-radius: 4px;
    vertical-align: middle;
  }
  h1 span.badge.on { background: #1b5e20; color: #81c784; }
  h1 span.badge.off { background: #3e2723; color: #ef9a9a; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    scroll-behavior: smooth;
  }
  .msg {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold;
    margin-top: 2px;
  }
  .avatar.rob { background: #1565c0; }
  .avatar.hermes { background: #6a1b9a; }
  .avatar.gemini { background: #2e7d32; }
  .avatar.system { background: #555; font-size: 12px; }
  .bubble { flex: 1; min-width: 0; }
  .bubble .header {
    display: flex; gap: 8px; align-items: baseline;
    margin-bottom: 3px;
  }
  .bubble .name { font-weight: 700; font-size: 0.85em; }
  .name.rob { color: #4fc3f7; }
  .name.hermes { color: #ce93d8; }
  .name.gemini { color: #81c784; }
  .name.system { color: #aaa; }
  .bubble .time { font-size: 0.65em; color: #555; }
  .bubble .text {
    line-height: 1.6;
    font-size: 0.88em;
    color: #d0d0d0;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble .text code {
    background: #1a1a2e;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.9em;
    color: #7ec8e3;
  }
  .bubble .text pre {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 10px;
    overflow-x: auto;
    margin: 6px 0;
    font-size: 0.83em;
  }
  .divider {
    text-align: center;
    color: #333;
    font-size: 0.7em;
    padding: 6px 0;
    border-top: 1px solid #1a1a1a;
    margin: 8px 0;
  }

  /* Input area */
  #input-area {
    flex-shrink: 0;
    padding: 12px 0;
    border-top: 1px solid #2a2a2a;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #input-area textarea {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 14px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 0.9em;
    resize: none;
    min-height: 40px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }
  #input-area textarea:focus { border-color: #555; }
  #input-area button {
    background: #2e7d32;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.9em;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
    white-space: nowrap;
    height: 40px;
  }
  #input-area button:hover { background: #388e3c; }
  #input-area button:disabled { background: #333; color: #666; cursor: not-allowed; }

  #status {
    flex-shrink: 0;
    text-align: center;
    font-size: 0.7em;
    color: #555;
    padding: 4px 0 8px;
  }
  #status .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  .dot.green { background: #4caf50; }
  .dot.yellow { background: #ff9800; }
  .dot.red { background: #f44336; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Gemini setup overlay */
  #setup-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  #setup-overlay.show { display: flex; }
  #setup-overlay .card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 32px;
    max-width: 440px;
    text-align: center;
  }
  #setup-overlay .card h2 { color: #e0e0e0; margin-bottom: 12px; font-size: 1.2em; }
  #setup-overlay .card p { color: #999; margin-bottom: 20px; font-size: 0.85em; line-height: 1.5; }
  #setup-overlay .card button {
    background: #1565c0;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 0.9em;
    cursor: pointer;
    margin: 4px;
    font-weight: 600;
  }
  #setup-overlay .card button:hover { background: #1976d2; }
  #setup-overlay .card button.secondary { background: #333; color: #ccc; }
  #setup-overlay .card button.secondary:hover { background: #444; }
  #setup-overlay .card .status-row {
    margin: 12px 0;
    font-size: 0.8em;
    color: #888;
  }

  /* Scrollbar */
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    opacity: 0.7;
  }
  .typing .indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 8px 12px;
    background: #1a1a1a;
    border-radius: 12px;
  }
  .typing .indicator span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #666;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing .indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing .indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
</style>
</head>
<body>

<h1>
  <span class="rob">Rob</span>
  <span style="color:#555">·</span>
  <span class="hermes">Hermes</span>
  <span style="color:#555">·</span>
  <span class="gemini">Gemini</span>
  <span id="gemini-status" class="badge off">offline</span>
</h1>

<div id="chat"><div class="connecting">connecting...</div></div>

<div id="input-area">
  <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
  <button id="send-btn" disabled>Send</button>
</div>

<div id="status"><span class="dot yellow"></span>connecting...</div>

<!-- Setup overlay (first run) -->
<div id="setup-overlay" class="show">
  <div class="card">
    <h2>☯ Group Chat Setup</h2>
    <p>This chat connects <strong>Rob</strong>, <strong>Hermes</strong>, and <strong>Gemini</strong> in one place.<br>
    First, we need to launch Chrome and sign into Gemini on Windows.</p>
    <button id="launch-chrome-btn">🚀 Launch Chrome</button>
    <div id="setup-status" class="status-row"></div>
    <button id="skip-gemini-btn" class="secondary">Skip Gemini (chat with Hermes only)</button>
  </div>
</div>

<script>
// ===== STATE =====
let lastMsgCount = 0;
let sending = false;
let geminiConnected = false;
let geminiSignedIn = false;

// ===== DOM REFS =====
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
const geminiStatusBadge = document.getElementById('gemini-status');
const setupOverlay = document.getElementById('setup-overlay');
const setupStatus = document.getElementById('setup-status');
const launchBtn = document.getElementById('launch-chrome-btn');
const skipBtn = document.getElementById('skip-gemini-btn');

// ===== ESCAPE HTML =====
function esc(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// ===== RENDER MARKDOWN =====
function renderMarkdown(text) {
  let t = text;
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    return `<pre><code>${esc(code)}</code></pre>`;
  });
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

// ===== RENDER MESSAGES =====
function renderMessages(msgs) {
  if (!msgs || msgs.length === 0) {
    chatEl.innerHTML = '<div class="connecting">no messages yet — type something!</div>';
    return;
  }

  const html = msgs.map(m => {
    const body = renderMarkdown(m.body);
    return `
      <div class="msg">
        <div class="avatar ${m.type}">${esc(m.avatar)}</div>
        <div class="bubble">
          <div class="header">
            <span class="name ${m.type}">${esc(m.speaker)}</span>
            <span class="time">${esc(m.time)}</span>
          </div>
          <div class="text">${body}</div>
        </div>
      </div>
    `;
  }).join('');

  chatEl.innerHTML = html;
  chatEl.scrollTop = chatEl.scrollHeight;
}

// ===== TYPING INDICATOR =====
function showTyping(speaker) {
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.id = 'typing-indicator';
  typing.innerHTML = `
    <div class="avatar ${speaker.toLowerCase()}" style="opacity:0.5">${speaker[0]}</div>
    <div class="indicator"><span></span><span></span><span></span></div>
  `;
  // Remove old typing indicator if exists
  const old = document.getElementById('typing-indicator');
  if (old) old.remove();
  chatEl.appendChild(typing);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ===== FETCH MESSAGES =====
async function fetchMessages() {
  try {
    const resp = await fetch('/messages?t=' + Date.now());
    const data = await resp.json();
    const msgs = data.messages || [];

    if (msgs.length !== lastMsgCount) {
      hideTyping();
      renderMessages(msgs);
      lastMsgCount = msgs.length;
    }

    statusEl.innerHTML = `<span class="dot green"></span>live · ${msgs.length} msg${msgs.length > 0 ? ' · last: ' + msgs[msgs.length-1].speaker : ''}`;
  } catch (e) {
    statusEl.innerHTML = `<span class="dot red"></span>disconnected`;
  }
}

// ===== SEND MESSAGE =====
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;
  inputEl.disabled = true;
  showTyping('Gemini');

  try {
    const resp = await fetch('/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await resp.json();

    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Show Gemini typing while waiting, then refresh messages
    await fetchMessages();

    if (data.error === 'not_signed_in') {
      setupOverlay.classList.add('show');
      setupStatus.textContent = '⚠️ ' + data.message;
    }
  } catch (e) {
    statusEl.innerHTML = `<span class="dot red"></span>send error: ${e.message}`;
  } finally {
    sending = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
    hideTyping();
    inputEl.focus();
  }
}

// ===== CHECK GEMINI STATUS =====
async function checkGeminiStatus() {
  try {
    const resp = await fetch('/check-gemini');
    const data = await resp.json();
    geminiConnected = data.connected || false;
    geminiSignedIn = data.signed_in || false;

    if (geminiConnected && geminiSignedIn) {
      geminiStatusBadge.textContent = 'online';
      geminiStatusBadge.className = 'badge on';
      setupOverlay.classList.remove('show');
    } else if (geminiConnected) {
      geminiStatusBadge.textContent = 'chrome ok, needs sign-in';
      geminiStatusBadge.className = 'badge off';
    } else {
      geminiStatusBadge.textContent = 'offline';
      geminiStatusBadge.className = 'badge off';
    }
  } catch (e) {
    geminiStatusBadge.textContent = 'offline';
    geminiStatusBadge.className = 'badge off';
  }
}

// ===== LAUNCH CHROME =====
async function launchChrome() {
  launchBtn.disabled = true;
  setupStatus.textContent = 'Launching Chrome on Windows...';

  try {
    const resp = await fetch('/launch-chrome', { method: 'POST' });
    const data = await resp.json();

    if (data.status === 'ok') {
      if (data.signed_in) {
        setupStatus.textContent = '✅ Chrome connected & signed into Gemini!';
        await checkGeminiStatus();
      } else {
        setupStatus.innerHTML = `
          ✅ Chrome launched!<br>
          📌 A Chrome window should have opened on Windows.<br>
          Go to <strong>gemini.google.com</strong> in that window and sign in to Google.<br><br>
          <button onclick="recheckGemini()">🔄 I'm signed in — check again</button>
        `;
      }
    } else {
      setupStatus.textContent = '❌ ' + (data.message || 'Failed to launch Chrome');
      launchBtn.disabled = false;
    }
  } catch (e) {
    setupStatus.textContent = '❌ Error: ' + e.message;
    launchBtn.disabled = false;
  }
}

async function recheckGemini() {
  setupStatus.textContent = 'Checking sign-in status...';
  await checkGeminiStatus();
  if (!geminiSignedIn) {
    setupStatus.innerHTML = `
      Still not signed in. Open <strong>gemini.google.com</strong> in the Chrome window,<br>
      sign into Google, then click again:<br><br>
      <button onclick="recheckGemini()">🔄 Check again</button>
    `;
  }
}

// ===== SKIP GEMINI =====
function skipGemini() {
  setupOverlay.classList.remove('show');
  geminiStatusBadge.textContent = 'skipped';
  geminiStatusBadge.className = 'badge off';
  statusEl.innerHTML = `<span class="dot green"></span>chat mode: Hermes only`;
}

// ===== INPUT AUTO-RESIZE & ENTER =====
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  sendBtn.disabled = !inputEl.value.trim() || sending;
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ===== POLLING =====
setInterval(fetchMessages, 2500);
setInterval(checkGeminiStatus, 10000);
fetchMessages();

// ===== INIT =====
checkGeminiStatus();
launchBtn.addEventListener('click', launchChrome);
skipBtn.addEventListener('click', skipGemini);

// Check if already setup
(async () => {
  await checkGeminiStatus();
  if (geminiSignedIn) {
    setupOverlay.classList.remove('show');
  }
})();
</script>

</body>
</html>

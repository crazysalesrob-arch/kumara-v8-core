<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <defs>
    <!-- Psychedelic gradient background -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="40%" stop-color="#0d001a"/>
      <stop offset="100%" stop-color="#050008"/>
    </radialGradient>
    <!-- Acid colours -->
    <linearGradient id="neonPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#ff3399"/>
    </linearGradient>
    <linearGradient id="neonGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00ffcc"/>
    </linearGradient>
    <linearGradient id="neonGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Hand-drawn wobble filter -->
    <filter id="handDrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="turb" seed="3"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Wobble for thicker lines -->
    <filter id="wobble" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" result="turb" seed="7"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="url(#bgGrad)"/>

  <!-- Grid overlay (Matrix reference) -->
  <g opacity="0.06" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="0" x2="600" y2="900"/>
    <line x1="100" y1="0" x2="100" y2="900"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="500" y1="0" x2="500" y2="900"/>
    <line x1="0" y1="0" x2="600" y2="0"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="700" x2="600" y2="700"/>
    <line x1="0" y1="800" x2="600" y2="800"/>
  </g>

  <!-- Large central koru (hand-drawn style) -->
  <g filter="url(#handDrawn)">
    <!-- Outer koru spiral -->
    <path d="M300,380 
             C300,280 220,200 180,220 
             C140,240 160,320 220,340 
             C280,360 340,300 320,260 
             C300,220 260,240 260,270"
          fill="none" stroke="url(#neonPink)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Inner koru -->
    <path d="M300,390 
             C300,320 250,270 230,280 
             C210,290 220,340 260,350 
             C300,360 330,320 320,295 
             C310,270 285,285 285,300"
          fill="none" stroke="url(#neonGreen)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

    <!-- Second koru left -->
    <path d="M180,400 
             C120,380 60,320 80,280 
             C100,240 160,280 180,320 
             C200,360 180,400 140,410"
          fill="none" stroke="url(#neonGold)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

    <!-- Second koru right -->
    <path d="M420,400 
             C480,380 540,320 520,280 
             C500,240 440,280 420,320 
             C400,360 420,400 460,410"
          fill="none" stroke="url(#neonPink)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Small decorative koru top -->
  <g filter="url(#handDrawn)" opacity="0.6">
    <path d="M300,150 C290,130 270,125 265,135 C260,145 275,155 285,150 C295,145 290,135 285,138"
          fill="none" stroke="url(#neonGold)" stroke-width="3" stroke-linecap="round"/>
    <path d="M300,120 C290,100 270,95 265,105 C260,115 275,125 285,120 C295,115 290,105 285,108"
          fill="none" stroke="url(#neonGreen)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Roimata (teardrop) shapes - decorative border -->
  <g filter="url(#handDrawn)" opacity="0.5">
    <!-- Left column -->
    <path d="M50,250 C40,250 35,265 50,280 C65,265 60,250 50,250Z" fill="url(#neonGold)"/>
    <path d="M50,350 C40,350 35,365 50,380 C65,365 60,350 50,350Z" fill="url(#neonPink)"/>
    <path d="M50,450 C40,450 35,465 50,480 C65,465 60,450 50,450Z" fill="url(#neonGreen)"/>
    <path d="M50,550 C40,550 35,565 50,580 C65,565 60,550 50,550Z" fill="url(#neonGold)"/>
    <!-- Right column -->
    <path d="M550,250 C540,250 535,265 550,280 C565,265 560,250 550,250Z" fill="url(#neonGreen)"/>
    <path d="M550,350 C540,350 535,365 550,380 C565,365 560,350 550,350Z" fill="url(#neonGold)"/>
    <path d="M550,450 C540,450 535,465 550,480 C565,465 560,450 550,450Z" fill="url(#neonPink)"/>
    <path d="M550,550 C540,550 535,565 550,580 C565,565 560,550 550,550Z" fill="url(#neonGreen)"/>
  </g>

  <!-- Small scattered stars/dots (psychedelic) -->
  <g opacity="0.7">
    <circle cx="130" cy="180" r="3" fill="#ff00ff" filter="url(#glowPink)"/>
    <circle cx="470" cy="180" r="3" fill="#00ff88" filter="url(#glowGreen)"/>
    <circle cx="100" cy="600" r="2.5" fill="#ffcc00" filter="url(#glowGold)"/>
    <circle cx="500" cy="600" r="2.5" fill="#ff00ff" filter="url(#glowPink)"/>
    <circle cx="400" cy="130" r="2" fill="#00ffcc"/>
    <circle cx="200" cy="130" r="2" fill="#ff9900"/>
    <circle cx="150" cy="700" r="2" fill="#ff00ff"/>
    <circle cx="450" cy="700" r="2" fill="#00ff88"/>
  </g>

  <!-- LOVE RITUAL text - main brand -->
  <g filter="url(#wobble)">
    <text x="300" y="620" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="url(#neonPink)" filter="url(#glowPink)" letter-spacing="12">LOVE</text>
    <text x="300" y="690" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="url(#neonGold)" filter="url(#glowGold)" letter-spacing="8">RITUAL</text>
  </g>

  <!-- Tagline -->
  <g filter="url(#handDrawn)">
    <text x="300" y="740" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#00ff88" opacity="0.8" letter-spacing="4">ACID-KIWIANA</text>
    <text x="300" y="765" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#00ff88" opacity="0.5" letter-spacing="2">AOTEAROA PSYCHEDELIC</text>
  </g>

  <!-- Bottom decorative border - small koru row -->
  <g filter="url(#handDrawn)" opacity="0.4">
    <path d="M80,830 C85,820 95,820 90,830 C85,840 75,840 80,830Z" fill="none" stroke="url(#neonPink)" stroke-width="2"/>
    <path d="M130,830 C135,820 145,820 140,830 C135,840 125,840 130,830Z" fill="none" stroke="url(#neonGreen)" stroke-width="2"/>
    <path d="M180,830 C185,820 195,820 190,830 C185,840 175,840 180,830Z" fill="none" stroke="url(#neonGold)" stroke-width="2"/>
    <path d="M230,830 C235,820 245,820 240,830 C235,840 225,840 230,830Z" fill="none" stroke="url(#neonPink)" stroke-width="2"/>
    <path d="M280,830 C285,820 295,820 290,830 C285,840 275,840 280,830Z" fill="none" stroke="url(#neonGreen)" stroke-width="2"/>
    <path d="M370,830 C375,820 385,820 380,830 C375,840 365,840 370,830Z" fill="none" stroke="url(#neonPink)" stroke-width="2"/>
    <path d="M420,830 C425,820 435,820 430,830 C425,840 415,840 420,830Z" fill="none" stroke="url(#neonGold)" stroke-width="2"/>
    <path d="M470,830 C475,820 485,820 480,830 C475,840 465,840 470,830Z" fill="none" stroke="url(#neonGreen)" stroke-width="2"/>
    <path d="M520,830 C525,820 535,820 530,830 C525,840 515,840 520,830Z" fill="none" stroke="url(#neonPink)" stroke-width="2"/>
  </g>

  <!-- Vignette overlay -->
  <rect width="600" height="900" fill="url(#bgGrad)" opacity="0.15"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Hand-drawn wobble -->
    <filter id="hand" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="turb" seed="5"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Transparent background for t-shirt printing -->

  <!-- Central koru -->
  <g filter="url(#hand)">
    <!-- Main spiral -->
    <path d="M200,210 
             C200,150 150,110 120,130 
             C90,150 100,210 150,230 
             C200,250 250,200 235,170 
             C220,140 190,155 190,180"
          fill="none" stroke="#ff00ff" stroke-width="7" stroke-linecap="round"/>
    
    <!-- Inner spiral -->
    <path d="M200,220 
             C200,180 170,155 155,165 
             C140,175 145,210 175,220 
             C205,230 230,200 220,185 
             C210,170 195,180 195,192"
          fill="none" stroke="#ffcc00" stroke-width="5" stroke-linecap="round"/>

    <!-- Left koru -->
    <path d="M110,230 
             C70,220 40,180 50,160 
             C60,140 100,160 110,190 
             C120,220 100,240 80,245"
          fill="none" stroke="#00ff88" stroke-width="5" stroke-linecap="round"/>

    <!-- Right koru -->
    <path d="M290,230 
             C330,220 360,180 350,160 
             C340,140 300,160 290,190 
             C280,220 300,240 320,245"
          fill="none" stroke="#ff00ff" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- LOVE RITUAL text -->
  <g filter="url(#hand)">
    <text x="200" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#ff00ff" letter-spacing="8">LOVE</text>
    <text x="200" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#ffcc00" letter-spacing="6">RITUAL</text>
  </g>

  <!-- Small accent line under text -->
  <g filter="url(#hand)">
    <line x1="120" y1="410" x2="280" y2="410" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Roimata accents -->
  <g filter="url(#hand)" opacity="0.7">
    <path d="M70,140 C60,140 55,155 70,170 C85,155 80,140 70,140Z" fill="#ff00ff"/>
    <path d="M330,140 C320,140 315,155 330,170 C345,155 340,140 330,140Z" fill="#00ff88"/>
    <path d="M70,300 C60,300 55,315 70,330 C85,315 80,300 70,300Z" fill="#ffcc00"/>
    <path d="M330,300 C320,300 315,315 330,330 C345,315 340,300 330,300Z" fill="#ff00ff"/>
  </g>
</svg>